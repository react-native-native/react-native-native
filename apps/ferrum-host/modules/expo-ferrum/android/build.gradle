plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.ferrum'
version = '0.2.0'

android {
  namespace "expo.modules.ferrum"
  defaultConfig {
    versionCode 1
    versionName "0.2.0"

    externalNativeBuild {
      cmake {
        cppFlags "-std=c++20 -frtti -fexceptions"
        arguments "-DANDROID_STL=c++_shared"
      }
    }
  }

  externalNativeBuild {
    cmake {
      path "src/main/cpp/CMakeLists.txt"
      version "3.22.1"
    }
  }

  buildFeatures {
    prefab true
  }

  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation "com.facebook.react:react-android"
  implementation "com.facebook.fbjni:fbjni"
}
