name: Ferrum
options:
  bundleIdPrefix: com.ferrum
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
  generateEmptyDirectories: true

settings:
  base:
    SDKROOT: iphoneos
    SUPPORTED_PLATFORMS: iphoneos
    ARCHS: arm64
    VALID_ARCHS: arm64
    ONLY_ACTIVE_ARCH: NO
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"

targets:
  Ferrum:
    type: application
    platform: iOS
    deploymentTarget: "16.0"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ferrum.app
        PRODUCT_NAME: Ferrum
        INFOPLIST_FILE: ios/Info.plist
        CODE_SIGN_ENTITLEMENTS: ios/entitlements.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 595N2Z35V7
        CODE_SIGN_IDENTITY: "Apple Development"
        # arm64 only — no simulator slice needed for Phase 0
        ARCHS: arm64
        VALID_ARCHS: arm64
        ONLY_ACTIVE_ARCH: NO
        # Search paths for pre-built static libs
        LIBRARY_SEARCH_PATHS: "$(inherited) $(PROJECT_DIR)/../../target/aarch64-apple-ios/debug $(PROJECT_DIR)/../../vendor/hermes/lib/ios-arm64"
        # Linker extras: libc++ for Hermes C++ internals, -ObjC to pull ObjC categories from static libs
        OTHER_LDFLAGS: "$(inherited) -lc++ -ObjC"
        # Suppress unnecessary Xcode-generated asset catalogue symbols
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: NO

    # stub.c gives Xcode a compilation unit so the linker phase runs and pulls
    # in libferrum_ios.a.  The real main() is inside the Rust static library.
    sources:
      - path: Sources/stub.c

    dependencies:
      # Rust static library — main() entry point
      - framework: ../../target/aarch64-apple-ios/debug/libferrum_ios.a
        link: true
        embed: false
      # Hermes stable C ABI
      - framework: ../../vendor/hermes/lib/ios-arm64/libhermesabi.a
        link: true
        embed: false
      # Hermes VM
      - framework: ../../vendor/hermes/lib/ios-arm64/libhermesvm_a.a
        link: true
        embed: false
      # Hermes VM Runtime
      - framework: ../../vendor/hermes/lib/ios-arm64/libhermesVMRuntime.a
        link: true
        embed: false
      # Boost.Context (fibers used by Hermes StackExecutor)
      - framework: ../../vendor/hermes/lib/ios-arm64/libboost_context.a
        link: true
        embed: false
      # Apple system frameworks
      - sdk: UIKit.framework
      - sdk: Foundation.framework
      - sdk: QuartzCore.framework

    # Copy test_bundle.js into the app bundle as "bundle.js"
    postBuildScripts:
      - name: "Copy bundle.js"
        script: |
          set -e
          DEST="${CODESIGNING_FOLDER_PATH}/bundle.js"
          SRC="${SRCROOT}/../../js/test_bundle.js"
          cp "${SRC}" "${DEST}"
        showEnvVars: false
        basedOnDependencyAnalysis: false
